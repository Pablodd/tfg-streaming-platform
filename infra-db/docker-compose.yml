version: '3.8'
services:
  mariadb-tfg:
    image: mariadb:latest
    container_name: mariadb-tfg
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: streaming_db # La contraseña que pusimos
      MYSQL_DATABASE: streaming_platform
    ports:
      - "3306:3306"
    volumes:
      - ./data:/var/lib/mysql
      - ./init:/docker-entrypoint-initdb.d
